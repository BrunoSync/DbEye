services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    build: .
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: "MyDbEye_db"
      POSTGRES_USER: "MyDbEye_user"
      POSTGRES_PASSWORD: "dbeyepass"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U MyDbEye_user -d MyDbEye_db"]
      interval: 5s
      timeout: 5s
      retries: 5